apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker

spec:
  replicas: 1

  selector:
    matchLabels:
      app: expense-tracker

  template:
    metadata:
      labels:
        app: expense-tracker

    spec:
      containers:
      - name: expense-tracker
        image: chetan8889/expense-tracker:latest

        ports:
        - containerPort: 5001

        env:
        - name: DATABASE_URL
          value: "mysql+pymysql://expenseuser:Expense%40123@mysql:3306/expense_tracker"

        - name: SECRET_KEY
          value: "secret123"

        - name: JWT_SECRET_KEY
          value: "chetan_super_secure_jwt_secret_key_2026"
