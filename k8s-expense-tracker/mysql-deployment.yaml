apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "root123"
        - name: MYSQL_DATABASE
          value: "expense_tracker"
        - name: MYSQL_USER
          value: "expenseuser"
        - name: MYSQL_PASSWORD
          value: "Expense@123"
        ports:
        - containerPort: 3306
